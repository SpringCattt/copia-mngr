
        
        <div class="breadcrumbs">

            <img src="/images/placeholder.png" alt="Foto da Equipa" class="team-season-photo" onerror="this.onerror=null; this.src='https://dummyimage.com/200x120/e2e8f0/627d98.png&text=Foto+da+Equipa';">

                <div style="display: flex; align-items: center; gap: 15px; margin-top: 15px;">
                    <select id="season-selector" class="custom-input" style="min-width: 150px; padding: 10px; background-color: #f1f5f9; border-color: #cbd5e1; font-weight: bold; cursor: pointer;">
                        <option value="2025/2026">2025/2026 (Atual)</option>
                        <option value="2024/2025">2024/2025</option>
                        <option value="2023/2024">2023/2024</option>
                    </select>
                    
                    <button type="button" id="btn-create-season" class="btn-adicionar" style="background-color: #627d98; display: none;">+ Criar Nova Época</button>

    <script>
        // SIMULAÇÃO DO SISTEMA
        const tipoUtilizadorLogado = 'gestor'; // Muda para 'treinador' e os botões de adicionar somem

        if (tipoUtilizadorLogado === 'gestor') {
            document.getElementById('btn-create-season').style.display = 'inline-block';
            document.getElementById('btn-add-member').style.display = 'inline-block';
        }

        // LÊ O NOME DO ESCALÃO QUE VEM NO LINK DA PÁGINA ANTERIOR
        const urlParams = new URLSearchParams(window.location.search);
        const escalaoUrl = urlParams.get('escalao');
        if (escalaoUrl) {
            document.getElementById('page-title').textContent = `Plantel - ${escalaoUrl}`;
            document.getElementById('breadcrumb-escalao').textContent = escalaoUrl;
        }

        // ==========================================
        // LÓGICA PARA CRIAR UMA NOVA ÉPOCA 
        // ==========================================
        document.getElementById('btn-create-season').addEventListener('click', function() {
            // Abre uma caixa de diálogo a pedir a época
            const novaEpoca = prompt("Insira o nome da nova época (Ex: 2026/2027):");
            
            if (novaEpoca && novaEpoca.trim() !== '') {
                const select = document.getElementById('season-selector');
                const epocaLimpa = novaEpoca.trim();
                
                // Validação Antiduplicação das Épocas!
                let jaExiste = false;
                Array.from(select.options).forEach(opt => {
                    if (opt.value.toLowerCase() === epocaLimpa.toLowerCase()) {
                        jaExiste = true;
                    }
                });

                if(jaExiste) {
                    return alert('Esta época já existe na Base de Dados!');
                }

                // Adicionar à Dropdown e selecionar automaticamente
                const novaOpcao = document.createElement('option');
                novaOpcao.value = epocaLimpa;
                novaOpcao.textContent = epocaLimpa + " (Nova)";
                
                // Coloca a época mais recente no topo da lista
                select.insertBefore(novaOpcao, select.firstChild);
                select.value = epocaLimpa;
                
                alert(`A Época ${epocaLimpa} foi criada com sucesso!`);
                
                // Simula que a tabela agora está vazia para a nova época
                document.querySelector('#tabela-plantel tbody').innerHTML = `
                    <tr><td colspan="4" style="text-align: center; color: #999;">Não existem atletas nesta época. Clique em "+ Adicionar Atleta/Staff"</td></tr>
                `;
            }
        });
    </script>
