<link rel="stylesheet" href="/mngr/css/styles.css" onerror="console.warn('Ficheiro equipas.css não encontrado no caminho padrão.');">

<h3 class="section-title">Equipa Principal</h3>

<div class="main-team-card">
    <img src="/mngr/images/richmond-crest.png" alt="AFC Richmond" class="main-team-logo" onerror="this.onerror=null; this.src='https://dummyimage.com/80x80/f2f5f9/0a3d80.png&text=Logo';">
    <div class="main-team-info">
        <h2>AFC Richmond</h2>
        <p>
            <img src="/mngr/images/bandeira-inglaterra.png" alt="UK" class="icon-small" onerror="this.style.display='none'"> Inglaterra <br>
            <img src="/mngr/images/location-icon.png" alt="Local" class="icon-small" onerror="this.style.display='none'"> Richmond
        </p>
    </div>
</div>

<div class="gestor-panel" id="painel-gestor" style="display: none;">
    <h4 class="section-title" style="margin-top: 0;">Adicionar Novo Escalão</h4>
    
    <div class="add-team-form" style="margin-top: 15px; align-items: flex-start;">
        <select id="sport-select" class="custom-input" style="flex: 1;">
            <option value="" disabled selected>Escolhe a Modalidade...</option>
            <option value="futebol">Futebol</option>
            <option value="basquetebol">Basquetebol</option>
            <option value="futsal">Futsal</option>
            <option value="voleibol">Voleibol</option>
        </select>
        
        <input type="text" id="escalao-name" placeholder="Nome do Escalão (Ex: Sub-18)" class="custom-input" style="flex: 1;">
        
        <input type="file" id="escalao-foto" accept="image/*" class="custom-input" style="flex: 1; padding: 9px; cursor: pointer;">
        
        <button type="button" id="add-escalao-btn" class="btn-adicionar">+ Adicionar Escalão</button>
    </div>
</div>

<div id="modalidades-container"></div>

<script>
    // SIMULAÇÃO DE LOGIN
    const tipoUtilizadorLogado = 'gestor'; 

    if (tipoUtilizadorLogado === 'gestor') {
        document.getElementById('painel-gestor').style.display = 'block';
    }

    // ==========================================
    // LÓGICA PARA ADICIONAR ESCALÃO (COM VALIDAÇÃO)
    // ==========================================
    document.getElementById('add-escalao-btn').addEventListener('click', function() {
        
        const selectEl = document.getElementById('sport-select');
        const sportId = selectEl.value; 
        const sportName = selectEl.options[selectEl.selectedIndex].text; 
        
        const escalaoName = document.getElementById('escalao-name').value.trim();
        const fileInput = document.getElementById('escalao-foto');

        if (!sportId) return alert('Escolhe uma modalidade!');
        if (escalaoName === '') return alert('Insere o nome do escalão!');

        const gridId = sportId + '-grid'; 
        let gridElement = document.getElementById(gridId);

        // VALIDAÇÃO ANTIDUPLICAÇÃO
        if (gridElement) {
            const cartoesExistentes = gridElement.querySelectorAll('.team-info h4');
            let jaExiste = false;

            cartoesExistentes.forEach(function(titulo) {
                if (titulo.textContent.trim().toLowerCase() === escalaoName.toLowerCase()) {
                    jaExiste = true;
                }
            });

            if (jaExiste) {
                return alert(`O escalão "${escalaoName}" já existe na modalidade de ${sportName}!`);
            }
        }
        
        if (!gridElement) {
            const titleElement = document.createElement('h3');
            titleElement.classList.add('section-title');
            titleElement.textContent = sportName;

            gridElement = document.createElement('div');
            gridElement.classList.add('teams-grid');
            gridElement.id = gridId;

            document.getElementById('modalidades-container').appendChild(titleElement);
            document.getElementById('modalidades-container').appendChild(gridElement);
        }

        let fotoUrl = 'https://dummyimage.com/150x150/e2e8f0/627d98.png&text=Sem+Foto';
        if (fileInput.files && fileInput.files[0]) {
            fotoUrl = URL.createObjectURL(fileInput.files[0]); 
        }

        const newCard = document.createElement('a');
        newCard.classList.add('team-card');
        newCard.style.textDecoration = 'none'; 
        newCard.style.color = 'inherit';
        
        // Mantém a rota correta do GestorController capturada pelo SPA
        newCard.setAttribute('data-page', `equipa_detalhes.html?escalao=${encodeURIComponent(escalaoName)}`);
        newCard.href = `equipa_detalhes.html?escalao=${encodeURIComponent(escalaoName)}`;

        newCard.innerHTML = `
            <img src="${fotoUrl}" alt="${escalaoName}" class="team-photo">
            <div class="team-info">
                <h4>${escalaoName}</h4>
                <p>Ver plantel e épocas &rarr;</p>
            </div>
        `;

        gridElement.appendChild(newCard);
        
        document.getElementById('escalao-name').value = '';
        fileInput.value = '';
    });
</script>
